<!-- ======================================================
  SECCIÓN 8 — FORMULARIO DE REGISTRO
  📋 FORMULARIO:
  OPCIÓN A (recomendada): borra el <form>...</form>
    y pega el embed de tu Survey de GHL en su lugar.
  OPCIÓN B: cambia action="TU-WEBHOOK-GHL" por tu URL.
  Requiere: 00-GLOBAL-CSS.html pegado antes en GHL
====================================================== -->

<section class="s8" id="registro">
  <div class="s8__tag">Reserva tu plaza</div>
  <h2 class="s8__title">Apúntate — es gratis</h2>
  <p class="s8__sub">Martes 28 Abril · 19:00h España · Online</p>

  <div class="s8__box">
    <h3 class="s8__ftitle">Reserva tu plaza gratuita</h3>
    <p class="s8__fsub">Rellena tus datos y nos vemos el martes</p>

    <!-- ↓↓↓ OPCIÓN A: borra el form y pega embed de Survey GHL aquí ↓↓↓ -->
    <form action="TU-WEBHOOK-GHL" method="POST" id="form-registro">
      <input type="hidden" name="utm_source"   id="u_s" />
      <input type="hidden" name="utm_medium"   id="u_m" />
      <input type="hidden" name="utm_campaign" id="u_c" />
      <input type="hidden" name="utm_term"     id="u_t" />
      <div class="fg">
        <label for="r-name">Tu nombre</label>
        <input type="text" id="r-name" name="name" placeholder="Ej: Carlos García" required autocomplete="given-name" />
      </div>
      <div class="fg">
        <label for="r-phone">Teléfono</label>
        <input type="tel" id="r-phone" name="phone" placeholder="+34 600 000 000" required autocomplete="tel" />
      </div>
      <div class="fg">
        <label for="r-email">Email</label>
        <input type="email" id="r-email" name="email" placeholder="tu@email.com" required autocomplete="email" />
      </div>
      <button type="submit" class="s8__btn">👉 &nbsp;RESERVAR MI PLAZA GRATIS</button>
      <p class="s8__privacy">Tu información está segura. <a href="#">Política de privacidad</a>.</p>
    </form>
    <!-- ↑↑↑ FIN FORMULARIO ↑↑↑ -->

    <p class="s8__spots">⚠️ Plazas limitadas — cierra al completarse</p>
  </div>
</section>

<script>
(function(){
  var p = new URLSearchParams(window.location.search);
  [['utm_source','u_s'],['utm_medium','u_m'],['utm_campaign','u_c'],['utm_term','u_t']].forEach(function(x){
    var el = document.getElementById(x[1]);
    if(el && p.get(x[0])) el.value = p.get(x[0]);
  });
})();
</script>
