  SECCIÓN 1 — TOPBAR + BOTÓN CTA FLOTANTE (móvil)
  Requiere: 00-GLOBAL-CSS.html pegado antes en GHL
====================================================== -->

<div class="s1-bar">
  🔴 <strong>Martes 28 Abril · 19:00h España</strong> — Plazas limitadas 🔴
</div>

<!-- Botón flotante móvil -->
<div class="s1-floating" id="floatingCTA">
  <a href="#registro" class="s1-floating-btn">
    👉 &nbsp;RESERVAR MI PLAZA GRATIS
  </a>
</div>

<script>
(function(){
  var el = document.getElementById('floatingCTA');
  var shown = false;
  window.addEventListener('scroll', function(){
    if(window.scrollY > 300 && !shown){
      shown = true;
      el.classList.add('visible');
    } else if(window.scrollY <= 300 && shown){
      shown = false;
      el.classList.remove('visible');
    }
  }, { passive: true });
})();
</script>
